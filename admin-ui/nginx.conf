# Admin SPA for staging — assets live under /admin-ui/ (Vite base).
# Proxied from product frontend nginx at the same path.

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  location = /admin-ui {
    return 302 /admin-ui/;
  }

  location /admin-ui/ {
    try_files $uri $uri/ /admin-ui/index.html;
  }

  location = /admin-ui/index.html {
    add_header Cache-Control "no-cache";
  }

  location ~* ^/admin-ui/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
