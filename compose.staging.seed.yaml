# One-shot seed/tools against staging network (not for long-running).
# Prefer Makefile:
#   make staging-db-setup STAGING_ENV=.env
#   make staging-demo-migrate STAGING_ENV=.env
#
# Or manually:
#   docker compose --env-file .env -f compose.staging.yaml -f compose.staging.seed.yaml \
#     run --rm seed sh -c 'npm ci && npx prisma generate && npm run seed:catalogos'

services:
  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./backend:/app
      - staging_seed_node_modules:/app/node_modules
      - ./migrations:/migrations:ro
    environment:
      NODE_ENV: development
      DEMO_SEED_ENABLED: "true"
      MIGRATE_DATA_DIR: /migrations/test20260719
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-tador_stg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-tador_staging}
      POSTGRES_PORT: "5432"
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      SESSION_SECRET: ${SESSION_SECRET:-seed-only-not-for-runtime}
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  staging_seed_node_modules:
