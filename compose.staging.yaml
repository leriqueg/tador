# TADOR staging stack — VPS / RSH (HAProxy modular same-origin).
# Guide: docs/deploy/rsh-vps-app-example/haproxy-same-origin.md
#
# Usage (from repo root on the VPS):
#   make staging-up STAGING_ENV=.env
#   make staging-db-setup STAGING_ENV=.env
#
# Frontend joins external network rsh-net-prod so modular HAProxy can reach
# container_name tador-stg-frontend:80. Path split (/api|/auth|/book|/health)
# is done by frontend/nginx.conf → backend:3000.
#
# Loopback publish is only for host smoke tests (optional):
#   127.0.0.1:${BACKEND_HOST_PORT:-3000}  → Fastify
#   127.0.0.1:${FRONTEND_HOST_PORT:-8080} → nginx SPA (+ API gateway)
#
# Do NOT use this file for local day-to-day development (use compose.yaml).

name: tador-staging

services:
  postgres:
    image: postgres:18.4-alpine
    container_name: tador-stg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tador_staging}
      POSTGRES_USER: ${POSTGRES_USER:-tador_stg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - staging_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No host ports — only reachable on the Compose network.
    networks:
      - default

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: tador-stg-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_USER: ${POSTGRES_USER:-tador_stg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-tador_staging}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      ENABLE_PLANTILLAS_ADMIN: ${ENABLE_PLANTILLAS_ADMIN:-false}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-false}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s
    networks:
      - default

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: tador-stg-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - default
      - rsh-net-prod

volumes:
  staging_postgres_data:

networks:
  rsh-net-prod:
    external: true
    name: rsh-net-prod
