services:
  postgres:
    image: postgres:18.4-alpine
    container_name: tador-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tador_dev}
      POSTGRES_USER: ${POSTGRES_USER:-tador}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tador_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
