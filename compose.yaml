services:
  postgres:
    image: postgres:18.4-alpine
    container_name: tador-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tador_dev}
      POSTGRES_USER: ${POSTGRES_USER:-tador}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tador_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init-test-db.sql:/docker-entrypoint-initdb.d/02-init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: tador-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
      - "5555:5555"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tador}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tador_dev_password}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-tador_dev}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      OPERATOR_SESSION_SECRET: ${OPERATOR_SESSION_SECRET:-change-me-admin-session}
      DEPLOYMENT_PROFILE: ${DEPLOYMENT_PROFILE:-full}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080,http://localhost:5173,http://frontend:5173}
      ADMIN_CORS_ORIGIN: ${ADMIN_CORS_ORIGIN:-http://localhost:8080,http://localhost:5174,http://admin-ui:5174}
      ADMIN_INITIAL_EMAIL: ${ADMIN_INITIAL_EMAIL:-admin@localhost}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-dev-admin}
      PORT: 3000
      HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tador-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_PROXY_TARGET: http://backend:3000
      VITE_BASE_PATH: ${FRONTEND_BASE_PATH:-/webapp/}
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173/webapp/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
    container_name: tador-admin-ui
    restart: unless-stopped
    ports:
      - "${ADMIN_UI_PORT:-5174}:5174"
    environment:
      VITE_PROXY_TARGET: http://backend:3000
      VITE_BASE_PATH: ${ADMIN_UI_BASE_PATH:-/admin-ui/}
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./admin-ui:/app
      - admin_ui_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5174/admin-ui/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  gateway:
    image: nginx:1.27-alpine
    container_name: tador-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      admin-ui:
        condition: service_healthy
      backend:
        condition: service_healthy

  # Playwright runner on the compose network (service DNS, not localhost).
  # Usage: make test-e2e  →  docker compose --profile e2e run --rm e2e
  e2e:
    profiles: ["e2e"]
    build:
      context: ./frontend
      dockerfile: Dockerfile.e2e
    container_name: tador-e2e
    environment:
      CI: "1"
      PLAYWRIGHT_SKIP_WEBSERVER: "1"
      # Prefer gateway path when testing staging-like routing; override for direct Vite if needed.
      PLAYWRIGHT_BASE_URL: ${PLAYWRIGHT_BASE_URL:-http://gateway/webapp}
      PLAYWRIGHT_API_URL: http://backend:3000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      gateway:
        condition: service_started

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
  admin_ui_node_modules:
