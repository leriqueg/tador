# Local / staging-like path router (HAProxy → nginx → services).
# Admin UI is intentionally open; IP allowlist is deferred.

upstream tador_backend {
    server backend:3000;
}

upstream tador_frontend {
    server frontend:5173;
}

upstream tador_admin_ui {
    server admin-ui:5174;
}

server {
    listen 80;
    server_name _;

    # API + product auth paths (same as Vite proxy)
    location /api/ {
        proxy_pass http://tador_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass http://tador_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /book/ {
        proxy_pass http://tador_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://tador_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Product SPA (Vite base /webapp/)
    location /webapp/ {
        proxy_pass http://tador_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Operator SPA (Vite base /admin-ui/)
    # TODO(security): restrict by IP/VPN at HAProxy or here before production hardening.
    location /admin-ui/ {
        proxy_pass http://tador_admin_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = / {
        return 302 /webapp/;
    }
}
