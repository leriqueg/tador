# Drop-in nginx locations for staging (behind HAProxy).
# Adjust upstream hostnames/ports to match the staging compose/k8s network.
#
# Path contract: docs/deploy-path-routing.md
#
# TODO(security): later allowlist IPs (or require VPN) for /admin-ui/ and /api/admin/.

upstream tador_backend {
    server backend:3000;
}

upstream tador_frontend {
    server frontend:5173;
}

upstream tador_admin_ui {
    server admin-ui:5174;
}

server {
    listen 80;
    server_name _;

    location /api/ {
        proxy_pass http://tador_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass http://tador_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /book/ {
        proxy_pass http://tador_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://tador_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /webapp/ {
        proxy_pass http://tador_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Open access in this stage (no IP restriction yet).
    location /admin-ui/ {
        proxy_pass http://tador_admin_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = / {
        return 302 /webapp/;
    }
}
