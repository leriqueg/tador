# OpenSpec Configuration for TADOR
context: |
  TADOR es una aplicación web en etapa de diseño (foundation phase) para la economía del hogar
  y control financiero profesional ligero. El estado actual es puramente de diseño y
  especificación, centrado en definir la constitución, los requisitos y el modelo conceptual.
  La implementación técnica posterior se enfocará en un backend en Node.js con Fastify,
  PostgreSQL y Prisma usando TDD, y un frontend en React con TypeScript y Mantine.

strict_tdd: false

testing:
  runner: null
  framework: null
  coverage:
    available: false
    command: null
  layers:
    unit:
      available: false
      tool: null
    integration:
      available: false
      tool: null
    e2e:
      available: false
      tool: null
  quality:
    linter:
      available: false
      command: null
    type_checker:
      available: false
      command: null
    formatter:
      available: false
      command: null

phases:
  proposal:
    enabled: true
    rule: "standard"
  spec:
    enabled: true
    rule: "standard"
  design:
    enabled: true
    rule: "standard"
  tasks:
    enabled: true
    rule: "standard"
  apply:
    enabled: true
    rule: "standard"
  verify:
    enabled: true
    rule: "standard"
  archive:
    enabled: true
    rule: "standard"
