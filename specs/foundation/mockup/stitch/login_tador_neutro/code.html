<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TADOR - Ingresar</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts: Manrope -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#00504d",
                        "on-primary": "#ffffff",
                        "primary-container": "#b4f0eb",
                        "on-primary-container": "#00201e",
                        "secondary": "#4a6361",
                        "on-secondary": "#ffffff",
                        "secondary-container": "#cce8e5",
                        "on-secondary-container": "#051f1e",
                        "tertiary": "#48617a",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#cfe5ff",
                        "on-tertiary-container": "#001d32",
                        "error": "#ba1a1a",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-error-container": "#410002",
                        "background": "#fdf8f5",
                        "on-background": "#191c1b",
                        "surface": "#fdf8f5",
                        "on-surface": "#191c1b",
                        "surface-variant": "#dae5e3",
                        "on-surface-variant": "#3f4948",
                        "outline": "#6f7978",
                        "outline-variant": "#bec9c7",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f8f3f0",
                        "surface-container": "#f2edeb",
                        "surface-container-high": "#ece8e5",
                        "surface-container-highest": "#e6e2df",
                        "text-main": "#191c1b",
                        "text-muted": "#64748B",
                        "warning-amber": "#F59E0B",
                        "success-emerald": "#10B981",
                        "expense-rose": "#E11D48"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.5rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "lg": "24px",
                        "container-max": "1200px",
                        "xl": "40px",
                        "md": "16px",
                        "sm": "12px",
                        "xs": "8px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "body-lg": ["Manrope"],
                        "label-sm": ["Manrope"],
                        "headline-xl": ["Manrope"],
                        "body-md": ["Manrope"],
                        "headline-lg-mobile": ["Manrope"],
                        "headline-lg": ["Manrope"],
                        "label-md": ["Manrope"],
                        "headline-md": ["Manrope"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "600"}],
                        "headline-xl": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .squishy-btn:active {
            transform: scale(0.98);
        }
        .warm-gradient {
            background: radial-gradient(circle at 0% 0%, rgba(217, 119, 6, 0.03) 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(0, 80, 77, 0.03) 0%, transparent 50%);
        }
        .card-shadow {
            box-shadow: 0 4px 20px rgba(139, 92, 71, 0.06);
        }
    </style>
</head>
<body class="bg-surface font-body-md text-on-surface min-h-screen flex flex-col warm-gradient">
<!-- Top Navigation Shell -->
<header class="fixed top-0 w-full z-50 px-md md:px-lg h-16 flex items-center justify-center">
<div class="max-w-container-max w-full flex justify-between items-center">
<span class="font-headline-md text-headline-md font-extrabold text-primary tracking-tight">TADOR</span>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-gutter pt-20 pb-12">
<!-- Login Card -->
<div class="w-full max-w-[440px] bg-white rounded-lg card-shadow p-lg md:p-xl flex flex-col gap-xl border border-surface-container-high">
<!-- Header Section -->
<div class="flex flex-col gap-xs text-center md:text-left">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary">¡Hola de nuevo!</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Ingrese sus datos para gestionar su economía.</p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-lg" onsubmit="return false;">
<!-- Email Input -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface-variant px-base" for="email">Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full h-12 pl-11 pr-md bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all font-body-md placeholder:text-outline" id="email" name="email" placeholder="nombre@ejemplo.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-base">
<div class="flex justify-between items-center px-base">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Contraseña</label>
<a class="font-label-sm text-label-sm text-secondary hover:text-primary hover:underline underline-offset-4 transition-all" href="#">¿Olvidó su contraseña?</a>
</div>
<div class="relative group" id="password-container">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full h-12 pl-11 pr-11 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all font-body-md placeholder:text-outline" id="password" name="password" placeholder="••••••••" type="password"/>
<button aria-label="Mostrar contraseña" class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors focus:outline-none" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="password-toggle-icon">visibility</span>
</button>
</div>
</div>
<!-- Login Button -->
<button class="squishy-btn w-full h-14 bg-primary text-on-primary font-headline-md text-headline-md rounded-full shadow-md hover:bg-primary/90 transition-all flex items-center justify-center gap-sm mt-xs" type="submit">
                    Ingresar
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Bottom Divider & Register -->
<div class="flex flex-col items-center gap-md">
<div class="w-full h-px bg-surface-variant"></div>
<p class="font-body-md text-body-md text-on-surface-variant">
                    ¿No tiene cuenta? 
                    <a class="text-secondary font-bold hover:text-primary hover:underline underline-offset-4 transition-all" href="#">Regístrese</a>
</p>
</div>
</div>
</main>
<!-- Footer Shell -->
<footer class="w-full py-lg px-md bg-surface-container-low">
<div class="max-w-container-max mx-auto flex flex-col md:flex-row justify-between items-center gap-md border-t border-surface-variant pt-md">
<span class="font-label-sm text-label-sm text-on-surface-variant">© 2026 TADOR</span>
<div class="flex gap-lg">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary hover:underline underline-offset-4 transition-all" href="#">Privacidad</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary hover:underline underline-offset-4 transition-all" href="#">Términos</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary hover:underline underline-offset-4 transition-all" href="#">Soporte</a>
</div>
</div>
</footer>
<!-- Background Decoration (Visual Interest - Warmer feeling) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none overflow-hidden">
<div class="absolute -top-20 -left-20 w-80 h-80 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute top-1/2 -right-40 w-96 h-96 bg-tertiary/5 rounded-full blur-3xl"></div>
</div>
<!-- Scripts -->
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('password-toggle-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = 'visibility';
            }
        }

        document.querySelectorAll('.squishy-btn').forEach(btn => {
            btn.addEventListener('mousedown', () => btn.classList.add('scale-95'));
            btn.addEventListener('mouseup', () => btn.classList.remove('scale-95'));
            btn.addEventListener('mouseleave', () => btn.classList.remove('scale-95'));
        });
    </script>
</body></html>
