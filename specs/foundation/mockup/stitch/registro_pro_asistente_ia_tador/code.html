<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .squishy-active:active {
            transform: scale(0.96);
            transition: transform 0.1s ease-out;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .ai-shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fb;
        }
    </style>

<main class="px-md mt-sm max-w-lg mx-auto">

<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-primary">Contame qué pasó, yo me encargo del resto...</h2>
</div>
</div>
<div class="relative group">
<textarea class="w-full min-h-[160px] p-md rounded-xl border-none shadow-[0_4px_12px_rgba(19,78,74,0.05)] bg-surface-container-lowest focus:ring-2 focus:ring-primary/20 text-body-md text-on-surface resize-none placeholder:text-outline-variant transition-all" id="ai-input" placeholder="Escribí aquí tus movimientos en lenguaje natural...">Ayer pagué 5000 de luz con la tarjeta de crédito</textarea>
<div class="absolute bottom-md right-md flex gap-xs">
<button class="material-symbols-outlined text-outline-variant hover:text-primary transition-colors">mic</button>
<button class="material-symbols-outlined text-outline-variant hover:text-primary transition-colors">attach_file</button>
</div>
</div>
<button class="w-full py-md bg-primary text-on-primary rounded-xl font-label-md flex items-center justify-center gap-xs shadow-lg hover:brightness-110 active:scale-[0.98] transition-all overflow-hidden relative" onclick="processIntention()">
<span class="material-symbols-outlined" data-weight="fill">auto_awesome</span>

                <div class="ai-shimmer absolute inset-0 pointer-events-none"></div>
</button>
</section>
<!-- Result Area (Hidden initially, triggered by JS) -->
<section class="mt-xl hidden animate-[slideUp_0.4s_ease-out]" id="result-area">
<div class="flex items-center gap-xs mb-sm">
<span class="material-symbols-outlined text-success-emerald" data-weight="fill">check_circle</span>
<p class="font-label-md text-on-surface">Parece que es la plantilla: <span class="font-bold text-primary">Pago de Servicios</span></p>
</div>
<div class="bg-surface-container-lowest rounded-xl p-md shadow-[0_4px_12px_rgba(19,78,74,0.05)] border-l-4 border-success-emerald space-y-md">
<div class="grid grid-cols-2 gap-md">
<div class="space-y-1">
<p class="text-label-sm text-outline font-medium uppercase tracking-wider">Monto</p>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-primary text-sm">payments</span>
<p class="font-headline-md text-primary">$5.000,00</p>
</div>
</div>
<div class="space-y-1">
<p class="text-label-sm text-outline font-medium uppercase tracking-wider">Cuenta</p>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-primary text-sm">credit_card</span>

</div>
</div>
<div class="space-y-1">

</div>

<button class="flex flex-col items-center justify-center text-on-surface-variant py-1 hover:text-primary transition-all active:scale-90 duration-150">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-label-sm text-label-sm">Resumen</span>

<span class="font-label-sm text-label-sm">Apuntes</span>

<style>
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
<script>
        function processIntention() {
            const resultArea = document.getElementById('result-area');
            const emptyState = document.getElementById('empty-state-visual');
            const button = event.currentTarget;

            // Simple tactile feedback
            button.classList.add('opacity-50');
            button.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Procesando...';

            setTimeout(() => {
                button.classList.remove('opacity-50');
                button.innerHTML = '<span class="material-symbols-outlined" data-weight="fill">auto_awesome</span> Procesar intención <div class="ai-shimmer absolute inset-0 pointer-events-none"></div>';
                
                emptyState.classList.add('hidden');
                resultArea.classList.remove('hidden');
                
                // Scroll into view
                resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 1200);
        }

        // Initialize textarea with a focus glow if not empty
        const textarea = document.getElementById('ai-input');
        textarea.addEventListener('input', () => {
            if (textarea.value.length > 0) {
                textarea.classList.add('ring-2', 'ring-primary/10');
            } else {
                textarea.classList.remove('ring-2', 'ring-primary/10');
            }
        });
    </script>
