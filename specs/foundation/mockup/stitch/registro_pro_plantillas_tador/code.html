<!DOCTYPE html><html class="light" lang="es"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>TADOR - Registro Pro</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .transition-all-300 {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .step-entry {
            animation: slideUp 0.5s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .squishy:active {
            transform: scale(0.96);
        }

        .gradient-blur {
            background: linear-gradient(135deg, rgba(17, 94, 89, 0.05) 0%, rgba(255, 255, 255, 0) 100%);
        }
    </style>

                        "on-surface-variant": "#404847",

                        "secondary-container": "#62fae3",
                        "surface-tint": "#316763",
                        "text-muted": "#64748B",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#9ad1cb",
                        "surface-container": "#eceef0",
                        "inverse-surface": "#2d3133",
                        "surface-variant": "#e0e3e5",
                        "surface-dim": "#d8dadc",
                        "secondary-fixed": "#62fae3",
                        "on-primary-container": "#87beb8",
                        "outline-variant": "#bfc8c6",
                        "on-secondary-fixed-variant": "#005047",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#a9b6b4",

                        "surface": "#f7f9fb",

                    "borderRadius": {

                    "spacing": {

                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],

<body class="bg-background text-on-background font-body-md min-h-screen pb-24">
<!-- TopAppBar -->
<header class="bg-background w-full top-0 sticky z-40 flex justify-between items-center px-md py-xs">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-full overflow-hidden bg-primary-fixed flex items-center justify-center">
<img class="w-full h-full object-cover" data-alt="A friendly and professional digital illustration of Pacho the Poodle, the mascot of a finance app. He has a warm smile and is styled with a minimalist, modern aesthetic. The colors are dominated by soft teals and warm whites, reflecting a calm and organized financial environment. The background is simple and airy." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCBov5sfhcY_hwGZ___Ix3Baf27U3G6Z1ylCHYILhCvG7NFUgF20EY8A5XGhyu-Wv_it6thyQfM94aLKyil6gOdDZ_F0qOG7_xdWFEFpzAC455PA0mBPcgDeW0ye4tbok9lar6crBL256wVvVCTtUKL9gwt4PbeJnnh0TlAkG4zA7OgLuBohTTu1l5UZ6VSEOWQpR4lVpg5jyxZk0ZRLXpFxBu45g897HkcnzVAgQNrBLkAIdPiQZ175VYugiWSX_exPmJfl_WK">
</div>
<span class="font-headline-md text-headline-md font-bold text-primary">TADOR</span>
</div>
<button class="hover:opacity-80 transition-opacity p-2 text-primary">
<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<!-- Main Content: Conversational Form -->
<main class="px-md mt-lg space-y-lg max-w-md mx-auto">
<!-- Pacho's Instruction -->
<div class="flex items-start gap-sm mb-xl">
<div class="bg-white p-md rounded-xl shadow-[0_4px_12px_rgba(19,78,74,0.05)] border-l-4 border-primary relative">
<p class="text-on-surface-variant font-medium italic">"¡Hola! Vamos a registrar esto rápido. Cuéntame los detalles paso a paso."</p>
<!-- Tooltip arrow -->
<div class="absolute left-[-8px] top-4 w-4 h-4 bg-white rotate-45 border-l-4 border-b-4 border-transparent"></div>
<button class="absolute top-2 right-2 text-outline-variant hover:text-primary transition-opacity p-1">
<span class="material-symbols-outlined text-[18px]">close</span>
</button></div>
</div>
<!-- Step 1: Type Selection (Completed) -->
<section class="step-entry space-y-sm" style="animation-delay: 0s;">
<h2 class="text-on-surface-variant font-label-md">Quiero registrar un...</h2>
<div class="flex flex-wrap gap-sm">
<button class="px-lg py-sm rounded-full bg-primary text-on-primary font-label-md squishy transition-all-300 flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">trending_down</span>
                    Gasto
                </button>
<button class="px-lg py-sm rounded-full bg-surface-container-high text-on-surface-variant font-label-md squishy transition-all-300">
                    Ingreso
                </button>
<button class="px-lg py-sm rounded-full bg-surface-container-high text-on-surface-variant font-label-md squishy transition-all-300">
                    Transferencia
                </button>
</div>
</section>
<!-- Step 2: Account Selection (Active) -->
<section class="step-entry space-y-sm" style="animation-delay: 0.15s;">
<div class="flex items-center gap-xs">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<h2 class="text-primary font-headline-md font-semibold">de mi cuenta...</h2>
</div>
<div class="grid grid-cols-1 gap-sm">
<div class="bg-surface-container-lowest p-md rounded-xl shadow-[0_4px_12px_rgba(19,78,74,0.1)] border-2 border-primary flex items-center justify-between squishy cursor-pointer">
<div class="flex items-center gap-md">
<div class="w-12 h-12 bg-expense-rose/10 text-expense-rose rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-[32px]">account_balance</span>
</div>
<div>
<p class="font-label-md text-on-surface font-bold">Banco Santander</p>
<p class="text-label-sm text-outline">**** 4920</p>
</div>
</div>
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<button class="text-primary font-label-md flex items-center gap-xs mt-xs opacity-70 hover:opacity-100">
<span class="material-symbols-outlined">expand_more</span>
                    Ver otras cuentas
                </button>
</div>
</section>
<!-- Step 3: Amount (Enabled) -->
<section class="step-entry space-y-sm" style="animation-delay: 0.3s;">
<h2 class="text-on-surface-variant font-label-md">por un monto de...</h2>
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 text-headline-md font-bold text-primary">$</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-lg pl-xl text-headline-lg font-headline-lg text-primary focus:ring-2 focus:ring-primary/20 placeholder:text-outline-variant" placeholder="0.00" type="number">
</div>
</section>
<!-- Step 4: Category (Disabled/Placeholder) -->
<section class="step-entry opacity-40 space-y-sm" style="animation-delay: 0.45s;">
<h2 class="text-on-surface-variant font-label-md">en la categoría de...</h2>
<div class="bg-surface-container-highest/50 border-2 border-dashed border-outline-variant rounded-xl p-md flex items-center justify-between">
<span class="text-on-surface-variant/60 font-body-md italic">Selecciona una categoría cuando completes el monto</span>
<span class="material-symbols-outlined text-outline-variant">category</span>
</div>
</section>
<!-- Final CTA (Contextual) -->
<div class="pt-lg">
<button class="w-full bg-primary text-on-primary py-md rounded-xl font-label-md font-bold shadow-lg flex items-center justify-center gap-sm squishy transition-all-300 opacity-50 cursor-not-allowed">
                Continuar
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-xs pb-6 pt-2 bg-surface-container-lowest shadow-lg z-50 rounded-t-xl">
<button class="flex flex-col items-center justify-center text-on-surface-variant py-1 hover:text-primary transition-all">
<span class="material-symbols-outlined">dashboard</span>
<span class="text-label-sm font-label-sm">Resumen</span>
</button>
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-4 py-1 active:scale-90 transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">edit_note</span>
<span class="text-label-sm font-label-sm">Apuntes</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant py-1 hover:text-primary transition-all">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="text-label-sm font-label-sm">Cuentas</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant py-1 hover:text-primary transition-all">
<span class="material-symbols-outlined">account_balance</span>
<span class="text-label-sm font-label-sm">Entidades</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant py-1 hover:text-primary transition-all">
<span class="material-symbols-outlined">settings</span>
<span class="text-label-sm font-label-sm">Ajustes</span>
</button>
</nav>
<!-- Floating Atmosphere Elements -->
<div class="fixed top-24 left-[-10%] w-[40%] h-[30%] bg-primary/5 rounded-full blur-3xl pointer-events-none -z-10"></div>
<div class="fixed bottom-32 right-[-10%] w-[50%] h-[40%] bg-secondary-container/10 rounded-full blur-3xl pointer-events-none -z-10"></div>
<script>
        // Micro-interaction: Update CTA state based on input
        const amountInput = document.querySelector('input[type="number"]');
        const nextBtn = document.querySelector('button.cursor-not-allowed');

        amountInput.addEventListener('input', (e) => {
            if (e.target.value > 0) {
                nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                nextBtn.classList.add('opacity-100', 'cursor-pointer');
            } else {
                nextBtn.classList.add('opacity-50', 'cursor-not-allowed');
                nextBtn.classList.remove('opacity-100', 'cursor-pointer');
            }
        });

        // Add soft entry delays
        document.querySelectorAll('.step-entry').forEach((el, index) => {
            el.style.animationDelay = `${index * 0.15}s`;
        });
    </script>


</body></html>
